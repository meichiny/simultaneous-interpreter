<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投影屏 / Projection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --orig-text-color: #b3b3b3;
            --text-size: 24px;
            --line-height: 1.6;
            --bg-opacity: 1;
        }

        html, body {
            height: 100%;
            font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .panel {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: var(--text-size, 24px);
            line-height: var(--line-height, 1.6);
        }

        .panel:last-child {
            margin-bottom: 0;
        }

        .panel-header {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #panelTop {
            color: var(--text-color, #ffffff);
        }

        #panelBottom {
            color: var(--orig-text-color, #b3b3b3);
        }

        .sentence {
            display: inline;
            margin-right: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pending {
            opacity: 0.7;
            font-style: italic;
        }

        /* 连接状态提示 */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            background: rgba(0,0,0,0.8);
            color: #666;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-bar.show {
            opacity: 1;
        }

        .status-bar.disconnected {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar">等待连接...</div>

    <div class="container">
        <div class="panel" id="panelTop">
            <div class="panel-header">译文 / Translation</div>
            <div id="contentTop"></div>
        </div>
        <div class="panel" id="panelBottom">
            <div class="panel-header">原文 / Original</div>
            <div id="contentBottom"></div>
        </div>
    </div>

    <script>
        // 投影屏逻辑：仅接收主窗口 postMessage 并显示
        (function() {
            const contentTop = document.getElementById('contentTop');
            const contentBottom = document.getElementById('contentBottom');
            const statusBar = document.getElementById('statusBar');

            // 显示连接状态
            function showStatus(text, isError) {
                statusBar.textContent = text;
                statusBar.className = 'status-bar show' + (isError ? ' disconnected' : '');
                setTimeout(() => {
                    statusBar.classList.remove('show');
                }, 3000);
            }

            // 更新文本显示
            function updateText(type, text, isFinal) {
                // 支持 textType ('trans'/'orig') 或 position ('top'/'bottom')
                let container;
                if (type === 'trans' || type === 'top') {
                    container = contentTop;
                } else {
                    container = contentBottom;
                }

                if (!text) return;

                // 检查最后一个句子是否 pending
                const lastSentence = container.querySelector('.sentence:last-child');

                if (lastSentence && lastSentence.classList.contains('pending')) {
                    // 有 pending 句子：更新内容
                    lastSentence.textContent = text;
                    // 如果是最终结果，移除 pending 标记
                    if (isFinal) {
                        lastSentence.classList.remove('pending');
                    }
                } else {
                    // 没有 pending 句子：创建新句子
                    const sentence = document.createElement('span');
                    sentence.className = 'sentence' + (isFinal ? '' : ' pending');
                    sentence.textContent = text;
                    container.appendChild(sentence);
                    container.appendChild(document.createTextNode(' '));

                    // 滚动到底部
                    const panel = container.closest('.panel');
                    panel.scrollTop = panel.scrollHeight;

                    // 如果句子太多，清理旧的
                    const sentences = container.querySelectorAll('.sentence');
                    if (sentences.length > 100) {
                        for (let i = 0; i < 20; i++) {
                            if (sentences[i]) sentences[i].remove();
                        }
                    }
                }
            }

            // 清空内容
            function clearContent() {
                contentTop.innerHTML = '';
                contentBottom.innerHTML = '';
            }

            // 辅助函数：将 hex 颜色转换为 rgba
            function hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }

            // 应用样式设置
            function applySettings(settings) {
                if (settings.fontSize) {
                    document.documentElement.style.setProperty('--text-size', settings.fontSize + 'px');
                }
                if (settings.lineHeight) {
                    document.documentElement.style.setProperty('--line-height', settings.lineHeight);
                }
                if (settings.transColor) {
                    document.documentElement.style.setProperty('--text-color', settings.transColor);
                }
                if (settings.origColor) {
                    document.documentElement.style.setProperty('--orig-text-color', settings.origColor);
                }
                // 背景颜色：支持透明度
                const bgColor = settings.bgColor || getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
                const bgOpacity = settings.bgOpacity !== undefined ? settings.bgOpacity : 100;
                if (bgColor && bgColor.startsWith('#')) {
                    const rgba = hexToRgba(bgColor, bgOpacity / 100);
                    document.documentElement.style.setProperty('--bg-color', rgba);
                } else if (settings.bgColor) {
                    document.documentElement.style.setProperty('--bg-color', settings.bgColor);
                }
            }

            // 从 URL 参数读取初始设置
            function loadSettingsFromUrl() {
                const params = new URLSearchParams(window.location.search);
                const settings = {};
                if (params.has('fs')) settings.fontSize = parseInt(params.get('fs'));
                if (params.has('lh')) settings.lineHeight = parseFloat(params.get('lh'));
                if (params.has('tc')) settings.transColor = '#' + params.get('tc');
                if (params.has('oc')) settings.origColor = '#' + params.get('oc');
                if (params.has('bc')) settings.bgColor = '#' + params.get('bc');
                if (params.has('bo')) settings.bgOpacity = parseInt(params.get('bo'));
                if (Object.keys(settings).length > 0) {
                    applySettings(settings);
                }
            }

            // 页面加载时应用 URL 参数设置
            loadSettingsFromUrl();

            // 监听主窗口消息
            window.addEventListener('message', function(e) {
                const data = e.data;
                if (!data) return;

                switch (data.type) {
                    case 'textUpdate':
                        // 支持 textType 或 position 参数
                        const textType = data.textType || data.position;
                        updateText(textType, data.text, data.isFinal);
                        break;

                    case 'clear':
                        clearContent();
                        break;

                    case 'settings':
                        applySettings(data.settings);
                        break;

                    case 'connected':
                        showStatus('已连接 / Connected');
                        break;

                    case 'disconnected':
                        showStatus('连接断开 / Disconnected', true);
                        break;
                }
            });

            // 检查是否为预览模式（通过 URL 参数）
            const urlParams = new URLSearchParams(window.location.search);
            const isPreview = urlParams.has('preview');

            // 检查 opener 是否存在
            if (!window.opener && !isPreview) {
                showStatus('请从控制台打开 / Please open from Control Panel', true);
            }

            // 心跳检测和 opener 检测：仅非预览模式下启用
            if (!isPreview) {
                let lastHeartbeat = Date.now();
                let hasReceivedHeartbeat = false;
                const HEARTBEAT_TIMEOUT = 5000;

                window.addEventListener('message', function(e) {
                    if (e.data && e.data.type === 'heartbeat') {
                        lastHeartbeat = Date.now();
                        hasReceivedHeartbeat = true;
                    }
                });

                // 检测 opener 是否关闭或不存在
                setInterval(() => {
                    // 如果 opener 已关闭或不存在，直接关闭窗口
                    if (!window.opener || window.opener.closed) {
                        showStatus('控制台已关闭，即将退出...', true);
                        setTimeout(() => window.close(), 2000);
                        return;
                    }
                    // 收到过心跳后，检测心跳超时
                    if (hasReceivedHeartbeat && Date.now() - lastHeartbeat > HEARTBEAT_TIMEOUT) {
                        showStatus('控制台已关闭，即将退出...', true);
                        setTimeout(() => window.close(), 2000);
                    }
                }, 1000);

                // 定期发送心跳到主窗口
                setInterval(() => {
                    if (window.opener && !window.opener.closed) {
                        try {
                            window.opener.postMessage({ type: 'ping', from: 'projection' }, '*');
                        } catch (e) {
                            // 跨域错误，忽略
                        }
                    }
                }, 2000);
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整日志 / Full Logs</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #252525;
            --border: #333333;
            --accent: #3b82f6;
            --text-main: #e5e5e5;
            --text-sub: #a3a3a3;
            --status-green: #10b981;
            --status-yellow: #f59e0b;
            --status-red: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .header-stats {
            font-size: 12px;
            color: var(--text-sub);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--bg-input);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar label {
            font-size: 12px;
            color: var(--text-sub);
        }

        .toolbar input, .toolbar select {
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .toolbar input[type="text"] {
            width: 200px;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-danger:hover {
            background: var(--status-red);
            border-color: var(--status-red);
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            font-family: "Consolas", "Monaco", "Courier New", monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-time {
            color: #666;
            margin-right: 10px;
        }

        .log-level {
            display: inline-block;
            width: 60px;
            text-align: center;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 10px;
        }

        .log-level-info {
            background: rgba(16, 185, 129, 0.2);
            color: var(--status-green);
        }

        .log-level-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--status-yellow);
        }

        .log-level-error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--status-red);
        }

        .log-level-debug {
            background: rgba(100, 100, 100, 0.2);
            color: #888;
        }

        .log-channel {
            color: var(--accent);
            margin-right: 10px;
            min-width: 60px;
            display: inline-block;
        }

        .log-message {
            color: var(--text-main);
        }

        .no-logs {
            text-align: center;
            color: var(--text-sub);
            padding: 50px;
            font-style: italic;
        }

        .highlight {
            background: rgba(59, 130, 246, 0.3);
            padding: 1px 2px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">📋 完整日志 / Full Logs</div>
        <div class="header-stats" id="stats">共 0 条日志</div>
    </div>

    <div class="toolbar">
        <div class="toolbar-group">
            <label>搜索 / Search:</label>
            <input type="text" id="search-input" placeholder="输入关键词...">
        </div>

        <div class="toolbar-group">
            <label>通道 / Channel:</label>
            <select id="channel-filter">
                <option value="all">全部 / All</option>
                <option value="speak">speak</option>
                <option value="listen">listen</option>
                <option value="system">system</option>
            </select>
        </div>

        <div class="toolbar-group">
            <label>级别 / Level:</label>
            <select id="level-filter">
                <option value="all">全部 / All</option>
                <option value="DEBUG">DEBUG</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
            </select>
        </div>

        <div class="toolbar-group" style="margin-left: auto;">
            <button class="btn" onclick="exportLogs()">📥 导出 / Export</button>
            <button class="btn btn-danger" onclick="clearAllLogs()">🗑️ 清空 / Clear</button>
        </div>
    </div>

    <div class="log-container" id="log-container">
        <div class="no-logs">暂无日志 / No logs available</div>
    </div>

    <script src="/static/js/logs.js"></script>
</body>
</html>
